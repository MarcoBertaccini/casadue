<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CasaDue 🏠</title>
  <meta name="description" content="Le spese di Marco e Sara" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <meta name="theme-color" content="#f7a8c4" />
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Playfair+Display:wght@700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css?v=20260630e" />
</head>
<body>
  <div id="app">
    <!-- PIN Screen -->
    <div id="pin-screen" class="screen active">
      <div class="pin-container">
        <div class="logo-mark">🏠</div>
        <h1 class="app-title">CasaDue</h1>
        <p class="pin-subtitle">Le spese di Marco & Sara</p>
        <div class="pin-inputs">
          <input type="password" class="pin-digit" maxlength="1" inputmode="numeric" pattern="[0-9]" />
          <input type="password" class="pin-digit" maxlength="1" inputmode="numeric" pattern="[0-9]" />
          <input type="password" class="pin-digit" maxlength="1" inputmode="numeric" pattern="[0-9]" />
          <input type="password" class="pin-digit" maxlength="1" inputmode="numeric" pattern="[0-9]" />
        </div>
        <p id="pin-error" class="pin-error hidden">PIN errato, riprova</p>
      </div>
    </div>

    <!-- Main App -->
    <div id="main-app" class="screen hidden">
      <!-- Header -->
      <header class="app-header">
        <div class="header-top">
          <span class="app-name">CasaDue</span>
          <div class="header-actions">
            <button class="btn-icon" id="btn-season-toggle" title="Tema stagionale">🌸</button>
            <button class="btn-icon" id="btn-logout" title="Esci">🔒</button>
          </div>
        </div>

        <!-- Holiday banner -->
        <div id="holiday-banner" class="holiday-banner hidden">
          <span id="holiday-text"></span>
        </div>

        <!-- Balance Scale -->
        <div class="balance-section">
          <div class="balance-scale" id="balance-scale">
            <div class="scale-beam" id="scale-beam">
              <div class="scale-person left" id="scale-marco">
                <div class="scale-avatar">M</div>
                <span class="scale-name">Marco</span>
                <span class="scale-amount" id="marco-credit">€0</span>
              </div>
              <div class="scale-pivot">⚖️</div>
              <div class="scale-person right" id="scale-sara">
                <div class="scale-avatar">S</div>
                <span class="scale-name">Sara</span>
                <span class="scale-amount" id="sara-credit">€0</span>
              </div>
            </div>
          </div>
          <div class="balance-summary" id="balance-summary">
            <p class="balance-text" id="balance-text">Caricamento...</p>
            <button type="button" id="btn-settle" class="btn-settle hidden">🤝 Abbiamo pareggiato</button>
          </div>
        </div>
      </header>

      <!-- Navigation -->
      <nav class="bottom-nav">
        <button class="nav-item active" data-page="home">
          <span class="nav-icon">🏠</span>
          <span class="nav-label">Home</span>
        </button>
        <button class="nav-item" data-page="add">
          <span class="nav-icon add-icon">+</span>
          <span class="nav-label">Aggiungi</span>
        </button>
        <button class="nav-item" data-page="recurring">
          <span class="nav-icon">🔄</span>
          <span class="nav-label">Fissi</span>
        </button>
        <button class="nav-item" data-page="stats">
          <span class="nav-icon">📊</span>
          <span class="nav-label">Stats</span>
        </button>
      </nav>

      <!-- Pages -->
      <main class="page-container">

        <!-- HOME PAGE -->
        <div id="page-home" class="page active">
          <div class="page-inner">
            <!-- Recurring countdowns -->
            <div id="recurring-alerts" class="recurring-alerts hidden"></div>

            <!-- Month filter -->
            <div class="month-filter">
              <button class="month-nav" id="prev-month">‹</button>
              <span class="month-label" id="month-label">Giugno 2026</span>
              <button class="month-nav" id="next-month">›</button>
            </div>

            <!-- Expenses list -->
            <div id="expenses-list" class="expenses-list">
              <div class="loading-spinner">Caricamento...</div>
            </div>
          </div>
        </div>

        <!-- ADD EXPENSE PAGE -->
        <div id="page-add" class="page">
          <div class="page-inner">
            <div class="page-add-header">
              <h2 class="page-title" style="margin-bottom:0">Nuova spesa</h2>
              <button type="button" class="btn-close-page" id="btn-close-add" aria-label="Chiudi">✕</button>
            </div>
            <form id="expense-form" class="expense-form">
              <div class="form-group">
                <label>Importo (€)</label>
                <input type="number" id="f-amount" placeholder="0.00" step="0.01" min="0.01" required />
              </div>
              <div class="form-group">
                <label>Descrizione</label>
                <input type="text" id="f-desc" placeholder="es. Spesa al supermercato" required />
                <div class="category-preview" id="category-preview"></div>
              </div>
              <div class="form-group">
                <label>Data</label>
                <input type="date" id="f-date" required />
              </div>
              <div class="form-group">
                <label>Chi ha pagato?</label>
                <div class="payer-toggle">
                  <button type="button" class="payer-btn active" data-payer="marco">Marco</button>
                  <button type="button" class="payer-btn" data-payer="sara">Sara</button>
                </div>
              </div>
              <div class="form-group">
                <label>Categoria</label>
                <div class="category-grid" id="category-grid"></div>
              </div>
              <div class="form-group">
                <label>Split</label>
                <div class="split-slider-wrap">
                  <span>Marco</span>
                  <input type="range" id="f-split" min="0" max="100" value="70" />
                  <span>Sara</span>
                </div>
                <div class="split-rows">
                  <div class="split-row">
                    <span class="split-name">Marco</span>
                    <input type="number" id="f-pct-a" class="split-pct" value="70" />
                    <span class="split-unit">%</span>
                    <span class="split-eq">=</span>
                    <span class="split-unit">€</span>
                    <input type="number" id="f-eur-a" class="split-eur" placeholder="—" step="0.01" />
                  </div>
                  <div class="split-row">
                    <span class="split-name">Sara</span>
                    <input type="number" id="f-pct-b" class="split-pct" value="30" />
                    <span class="split-unit">%</span>
                    <span class="split-eq">=</span>
                    <span class="split-unit">€</span>
                    <input type="number" id="f-eur-b" class="split-eur" placeholder="—" step="0.01" />
                  </div>
                </div>
              </div>
              <button type="submit" class="btn-primary">Salva spesa 💾</button>
            </form>
          </div>
        </div>

        <!-- RECURRING PAGE -->
        <div id="page-recurring" class="page">
          <div class="page-inner">
            <h2 class="page-title">Spese fisse</h2>
            <button class="btn-primary" id="btn-add-recurring">+ Aggiungi spesa fissa</button>
            <div id="recurring-list" class="recurring-list"></div>
          </div>
        </div>

        <!-- STATS PAGE -->
        <div id="page-stats" class="page">
          <div class="page-inner">
            <h2 class="page-title">Statistiche</h2>
            <div class="stats-month-selector">
              <button class="month-nav" id="stats-prev-month">‹</button>
              <span class="month-label" id="stats-month-label">Giugno 2026</span>
              <button class="month-nav" id="stats-next-month">›</button>
            </div>
            <div id="stats-content" class="stats-content"></div>
          </div>
        </div>

      </main>
    </div>
  </div>

  <!-- Receipt animation overlay -->
  <div id="receipt-overlay" class="receipt-overlay hidden">
    <div class="receipt">
      <div class="receipt-header">CasaDue 🏠</div>
      <div class="receipt-icon" id="receipt-icon"></div>
      <div class="receipt-desc" id="receipt-desc"></div>
      <div class="receipt-amount" id="receipt-amount"></div>
      <div class="receipt-footer">✓ Salvata!</div>
    </div>
  </div>

  <!-- Confetti canvas -->
  <canvas id="confetti-canvas" class="confetti-canvas hidden"></canvas>

  <!-- Recurring modal -->
  <div id="recurring-modal" class="modal hidden">
    <div class="modal-content">
      <h3>Spesa fissa</h3>
      <form id="recurring-form">
        <div class="form-group">
          <label>Descrizione</label>
          <input type="text" id="rf-desc" placeholder="es. Affitto" required />
        </div>
        <div class="form-group">
          <label>Importo (€)</label>
          <input type="number" id="rf-amount" step="0.01" min="0.01" required />
        </div>
        <div class="form-group">
          <label>Giorno del mese</label>
          <input type="number" id="rf-day" min="1" max="28" value="1" required />
        </div>
        <div class="form-group">
          <label>Chi paga?</label>
          <div class="payer-toggle">
            <button type="button" class="payer-btn active" data-payer="marco">Marco</button>
            <button type="button" class="payer-btn" data-payer="sara">Sara</button>
          </div>
        </div>
        <div class="form-group">
          <label>Categoria</label>
          <div class="category-grid" id="rf-category-grid"></div>
        </div>
        <div class="form-group">
          <label>Split</label>
          <div class="split-slider-wrap">
            <span>Marco</span>
            <input type="range" id="rf-split" min="0" max="100" value="70" />
            <span>Sara</span>
          </div>
          <div class="split-rows">
            <div class="split-row">
              <span class="split-name">Marco</span>
              <input type="number" id="rf-pct-a" class="split-pct" value="70" />
              <span class="split-unit">%</span>
              <span class="split-eq">=</span>
              <span class="split-unit">€</span>
              <input type="number" id="rf-eur-a" class="split-eur" placeholder="—" step="0.01" />
            </div>
            <div class="split-row">
              <span class="split-name">Sara</span>
              <input type="number" id="rf-pct-b" class="split-pct" value="30" />
              <span class="split-unit">%</span>
              <span class="split-eq">=</span>
              <span class="split-unit">€</span>
              <input type="number" id="rf-eur-b" class="split-eur" placeholder="—" step="0.01" />
            </div>
          </div>
        </div>
        <div class="modal-actions">
          <button type="button" class="btn-secondary" id="btn-cancel-recurring">Annulla</button>
          <button type="submit" class="btn-primary">Salva</button>
        </div>
      </form>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script src="app.js?v=20260630e"></script>
</body>
</html>
